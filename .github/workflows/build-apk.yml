# .github/workflows/build-apk.yml
# Builds the Anime App APK and uploads it as a GitHub Actions artifact.
# The APK is debug-signed (auto-signed with the debug keystore).
#
# To download the APK:
# 1. Go to the Actions tab on GitHub
# 2. Click the latest "Build Android APK" run
# 3. Scroll down to "Artifacts" → download "anime-app-apk"

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'Android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        working-directory: Android_app/Anime_App
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anime-app-apk
          path: Android_app/Anime_App/app/build/outputs/apk/debug/*.apk
          retention-days: 30
